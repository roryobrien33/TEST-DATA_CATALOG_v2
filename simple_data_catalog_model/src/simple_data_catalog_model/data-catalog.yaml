id: https://www.uuidea.eu/profiles/data-catalog
name: data_catalog_model

prefixes:
  linkml: https://w3id.org/linkml/
  sdcdc: https://www.uuidea.eu/profiles/data-catalog/
  dcat: http://www.w3.org/ns/dcat#
  odrl: http://www.w3.org/ns/odrl/2/
  prov: http://www.w3.org/ns/prov#
  xsd: http://www.w3.org/2001/XMLSchema#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  foaf: http://xmlns.com/foaf/0.1/
  vcard: http://www.w3.org/2006/vcard/ns#
  time: http://www.w3.org/2006/time#
  dqv: http://www.w3.org/ns/dqv#
  adms: http://www.w3.org/ns/adms#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#

imports:
  - linkml:types

default_prefix: sdcdc

classes:
  Any:
    class_uri: linkml:Any

  Resource:
    class_uri: dcat:Resource
    description: >-
      A resource that is described in the catalog (e.g., a dataset, a data service,
      or a catalog).
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the resource within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      title:
        description: A name given to the resource.
        slot_uri: dcterms:title
        range: string
        required: false

      description:
        description: >-
          Description may include but is not limited to an abstract,
          a table of contents, a graphical representation, or a free-text account
          of the resource.
        slot_uri: dcterms:description
        range: string
        required: false

      publisher:
        description: An entity responsible for making the resource available.
        slot_uri: dcterms:publisher
        range: Agent
        required: false
        multivalued: true
        inlined_as_list: true

      issued:
        description: Date of formal issuance (e.g., publication) of the resource.
        slot_uri: dcterms:issued
        range: date
        required: false
        multivalued: false

      contactPoint:
        description: Relevant contact information for the cataloged resource.
        slot_uri: vcard:contactPoint
        range: Kind
        required: false
        multivalued: true
        inlined_as_list: true

      license:
        description: A legal document giving official permission to do something with the resource.
        slot_uri: dcterms:license
        range: LicenseDocument
        required: false
        multivalued: true
        inlined_as_list: true

      version:
        description: The version indicator (name or identifier) of a resource.
        slot_uri: dcat:version
        range: string
        required: false

      status:
        description: The status of the asset in the context of a particular workflow process.
        slot_uri: adms:status
        range: string
        required: false

      modified:
        description: Date on which the resource was changed.
        slot_uri: dcterms:modified
        range: date
        required: false
        multivalued: false

      theme:
        description: A main category of the resource. A resource can have multiple themes.
        slot_uri: dcat:theme
        range: Concept
        multivalued: true
        inlined_as_list: true
        required: false

      wasDerivedFrom:
        description: >-
          A derivation is a transformation of an entity into another, an update of
          an entity resulting in a new one, or the construction of a new entity
          based on a pre-existing entity.
        slot_uri: prov:wasDerivedFrom
        range: Resource
        multivalued: true
        inlined_as_list: true
        required: false

      hasPolicy:
        description: The ODRL policy associated with this resource.
        slot_uri: odrl:hasPolicy
        range: Policy
        multivalued: true
        inlined_as_list: true
        required: false

  Dataset:
    class_uri: dcat:Dataset
    description: >-
      A collection of data, published or curated by a single agent, and available
      for access or download.
    is_a: Resource
    attributes:
      temporal:
        description: Temporal characteristics of the resource.
        slot_uri: dcterms:temporal
        range: PeriodOfTime
        required: false
        multivalued: true
        inlined_as_list: true

      inSeries:
        description: Series to which this dataset belongs.
        slot_uri: dcat:inSeries
        range: DatasetSeries
        required: false
        multivalued: true
        inlined_as_list: true

      distribution:
        description: An available distribution of the dataset.
        slot_uri: dcat:distribution
        range: Distribution
        required: false
        multivalued: true
        inlined_as_list: true

  Agent:
    class_uri: foaf:Agent
    description: >-
      An entity (person, organization, or software) that can be a publisher,
      creator, or contributor of a resource.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the agent within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      title:
        description: A name given to the agent.
        slot_uri: dcterms:title
        range: string
        required: false

      name:
        description: A name for the agent.
        slot_uri: foaf:name
        range: string
        required: false

      description:
        description: Description of the agent.
        slot_uri: dcterms:description
        range: string
        required: false

      type:
        description: Type of agent, e.g. person, organization, or software.
        slot_uri: rdf:type
        range: string
        required: false

  Kind:
    class_uri: vcard:Kind
    description: A vCard kind representing a contact point for a resource.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the contact point within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      fn:
        description: The formatted name of the contact point.
        slot_uri: vcard:fn
        range: string
        required: false

      hasEmail:
        description: The e-mail address associated with a contact point.
        slot_uri: vcard:hasEmail
        range: string
        required: false

      hasURL:
        description: A URL associated with a contact point.
        slot_uri: vcard:hasURL
        range: string
        required: false

  LicenseDocument:
    class_uri: dcterms:LicenseDocument
    description: A legal document giving official permission to do something with a resource.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the license within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      title:
        description: A name given to the license document.
        slot_uri: dcterms:title
        range: string
        required: false

      description:
        description: Description of the license document.
        slot_uri: dcterms:description
        range: string
        required: false

      access_url:
        description: A URL where the legal document can be accessed.
        slot_uri: dcat:accessURL
        range: string
        required: false

  PeriodOfTime:
    class_uri: dcterms:PeriodOfTime
    description: A temporal extent or interval.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the time period within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      hasBeginning:
        description: Beginning of the temporal interval.
        slot_uri: time:hasBeginning
        range: date
        required: false

      hasEnd:
        description: End of the temporal interval.
        slot_uri: time:hasEnd
        range: date
        required: false

  Concept:
    class_uri: skos:Concept
    description: A unit of thought (an idea or notion) that can be expressed as a term.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the concept within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      definition:
        description: A statement or formal explanation of the meaning of a concept.
        slot_uri: skos:definition
        range: string
        required: false

      prefLabel:
        description: The preferred lexical label for a resource, in a given language.
        slot_uri: skos:prefLabel
        range: string
        required: false

      altLabel:
        description: An alternative lexical label for a resource.
        slot_uri: skos:altLabel
        range: string
        required: false

      example:
        description: An example of the use of a concept.
        slot_uri: skos:example
        range: string
        required: false

      broader:
        description: A broader concept relation.
        slot_uri: skos:broader
        range: Concept
        multivalued: true
        inlined_as_list: true
        required: false

      narrower:
        description: A narrower concept relation.
        slot_uri: skos:narrower
        range: Concept
        multivalued: true
        inlined_as_list: true
        required: false

  DatasetSeries:
    is_a: Dataset
    class_uri: dcat:DatasetSeries
    description: A series of datasets that are related in some way.

  DataCatalog:
    is_a: Resource
    class_uri: dcat:Catalog
    description: A curated collection of metadata about datasets, data services, and related resources.
    attributes:
      dataset:
        description: Datasets that are part of the catalog.
        slot_uri: dcat:dataset
        range: Dataset
        required: false
        multivalued: true
        inlined_as_list: true

  Distribution:
    class_uri: dcat:Distribution
    description: >-
      A specific representation of a dataset, typically available for download
      or access via a service.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the distribution within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      title:
        description: A name given to the distribution.
        slot_uri: dcterms:title
        range: string
        required: false

      description:
        description: Description of the distribution.
        slot_uri: dcterms:description
        range: string
        required: false

      issued:
        description: Date of formal issuance of the distribution.
        slot_uri: dcterms:issued
        range: date
        required: false
        multivalued: false

      version:
        description: The version indicator of the distribution.
        slot_uri: dcat:version
        range: string
        required: false

      modified:
        description: Date on which the distribution was changed.
        slot_uri: dcterms:modified
        range: date
        required: false
        multivalued: false

      accessURL:
        description: >-
          A URL of the resource that gives access to a distribution of the dataset,
          e.g. landing page, feed, or endpoint.
        slot_uri: dcat:accessURL
        range: string
        required: false

      format:
        description: The file format, physical medium, or dimensions of the resource.
        slot_uri: dcterms:format
        range: string
        required: false

  DataService:
    class_uri: dcat:DataService
    description: A service that provides access to a dataset or a collection of datasets.
    is_a: Resource
    attributes:
      servesDataset:
        description: A collection of data that this data service can distribute.
        slot_uri: dcat:servesDataset
        range: Dataset
        multivalued: true
        required: false
        inlined_as_list: true

      endpointURL:
        description: The root location or primary endpoint of the service.
        slot_uri: dcat:endpointURL
        range: string
        multivalued: false
        required: false

  Metric:
    class_uri: dqv:Metric
    description: A measurable aspect of data quality (e.g., accuracy, completeness).
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the metric within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      definition:
        description: A statement or formal explanation of the metric.
        slot_uri: skos:definition
        range: string
        required: false

      prefLabel:
        description: The preferred lexical label for the metric.
        slot_uri: skos:prefLabel
        range: string
        required: false

      expectedDataType:
        description: Expected data type for the metric's observed value.
        slot_uri: dqv:expectedDataType
        range: Any
        required: false

      inDimension:
        description: The quality dimension to which the metric belongs.
        slot_uri: dqv:inDimension
        range: string
        required: false

  QualityMeasurement:
    class_uri: dqv:QualityMeasurement
    description: An observation of a metric applied to a specific resource.
    attributes:
      identifier:
        identifier: true
        description: An unambiguous reference to the quality measurement within a given context.
        slot_uri: dcterms:identifier
        range: string
        required: true

      computedOn:
        description: Resource on which the quality measurement is performed.
        slot_uri: dqv:computedOn
        range: Resource
        required: true

      isMeasurementOf:
        description: Indicates the metric being observed.
        slot_uri: dqv:isMeasurementOf
        range: Metric
        required: false

      value:
        description: Refers to the values computed by the metric.
        slot_uri: dqv:value
        required: false
        range: float

      generatedAtTime:
        description: Time at which the quality measurement was generated.
        slot_uri: prov:generatedAtTime
        range: date
        required: false

  Policy:
    class_uri: odrl:Policy
    is_a: Resource
    description: An ODRL policy that may contain permissions, prohibitions, and duties.
    attributes:
      permission:
        description: Permissions attached to this policy.
        slot_uri: odrl:permission
        range: Permission
        multivalued: true
        inlined_as_list: true
        required: false

      prohibition:
        description: Prohibitions attached to this policy.
        slot_uri: odrl:prohibition
        range: Prohibition
        multivalued: true
        inlined_as_list: true
        required: false

      duty:
        description: Duties attached to this policy.
        slot_uri: odrl:duty
        range: Duty
        multivalued: true
        inlined_as_list: true
        required: false

  Set:
    is_a: Policy
    class_uri: odrl:Set
    description: ODRL Set policy, representing any combination of rules.

  Rule:
    class_uri: odrl:Rule
    description: >-
      The Rule class is the parent of the Permission, Prohibition, and Duty classes,
      representing the common characteristics of these rule types.

  Permission:
    is_a: Rule
    class_uri: odrl:Permission
    description: Grants the assignee the right to perform an action.
    attributes:
      duty:
        description: Duties attached to permissions.
        slot_uri: odrl:duty
        range: Duty
        multivalued: true
        required: false
        inlined_as_list: true

  Prohibition:
    is_a: Rule
    class_uri: odrl:Prohibition
    description: Denies the assignee the right to perform an action.
    attributes:
      remedy:
        description: Remedies for prohibitions.
        slot_uri: odrl:remedy
        range: Duty
        multivalued: true
        required: false
        inlined_as_list: true

  Duty:
    is_a: Rule
    class_uri: odrl:Duty
    description: An obligation attached to a permission or prohibition.
    attributes:
      consequence:
        description: Consequences that become required if the duty is not fulfilled.
        slot_uri: odrl:consequence
        required: false
        multivalued: true
        inlined_as_list: true
        range: Duty

  Container:
    tree_root: true
    attributes:
      dataCatalog:
        multivalued: false
        range: DataCatalog
        required: true
        inlined: true

      datasets:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: Dataset
        required: false

      concepts:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: Concept
        required: false

      series:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: DatasetSeries
        required: false

      distributions:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: Distribution
        required: false

      metrics:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: Metric
        required: false

      qualityMeasurements:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: QualityMeasurement
        required: false

      dataServices:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: DataService
        required: false

      policies:
        multivalued: true
        inlined_as_list: true
        inlined: true
        range: Policy
        required: false