name: Create concept
description: Create an independent concept that can later be linked to datasets
title: "[Create Concept] "
labels: ["catalog-create-concept", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form to create an independent concept.

        Concepts are independent entities and are not tied to a catalog during creation.

        Relationship guidance:
        - If this is a child concept, provide the Parent concept ID.
        - If this is a parent concept, optionally provide Child concept IDs.
        - If this concept has no hierarchy relationship yet, leave those fields blank.

  - type: input
    id: concept_id
    attributes:
      label: Concept ID
      description: "Required. Stable identifier for the concept. Example: sdcdc:concept-voltage"
      placeholder: "sdcdc:concept-voltage"
    validations:
      required: true

  - type: input
    id: concept_pref_label
    attributes:
      label: Concept preferred label
      description: "Required. Human-readable concept name."
      placeholder: "Voltage"
    validations:
      required: true

  - type: textarea
    id: concept_definition
    attributes:
      label: Concept definition
      description: "Required. Brief definition of the concept."
      placeholder: "Electric potential difference between two points."
    validations:
      required: true

  - type: input
    id: concept_alt_label
    attributes:
      label: Concept alternative label (optional)
      description: "Optional. Alternative name or synonym."
      placeholder: "Electrical potential"
    validations:
      required: false

  - type: textarea
    id: concept_example
    attributes:
      label: Concept example (optional)
      description: "Optional. Example usage of the concept."
      placeholder: "Nominal feeder voltage."
    validations:
      required: false

  - type: dropdown
    id: relationship_type
    attributes:
      label: Relationship type
      description: "Select the hierarchy role of this concept."
      options:
        - No relationship
        - Child concept
        - Parent concept
      default: 0
    validations:
      required: true

  - type: input
    id: parent_concept_id
    attributes:
      label: Parent concept ID (required if child concept)
      description: "If Relationship type = Child concept, provide the parent concept ID."
      placeholder: "sdcdc:concept-electricity"
    validations:
      required: false

  - type: input
    id: child_concept_ids
    attributes:
      label: Child concept IDs (optional if parent concept)
      description: "If Relationship type = Parent concept, optionally provide child concept IDs, comma-separated."
      placeholder: "sdcdc:concept-phase-voltage, sdcdc:concept-line-voltage"
    validations:
      required: false
