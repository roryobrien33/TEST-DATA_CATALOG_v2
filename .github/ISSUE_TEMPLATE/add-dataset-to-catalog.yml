name: Add dataset
description: Add a new dataset to the single-catalog model
title: "[Add Dataset] "
labels: ["catalog-add-dataset", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form to add a new dataset to the single-catalog model.

        The dataset will be created as its own YAML file in:
        - `data-catalog/datasets/`

        If distributions are provided, each distribution will be created as its own YAML file in:
        - `data-catalog/distributions/`

        Distribution blocks format:

        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Optional additional dataset links should use existing IDs.

  - type: input
    id: dataset_identifier
    attributes:
      label: Dataset identifier
      description: |
        Required. You can provide:
        - a full identifier, e.g. `sdcdc:dataset-my-data-ABC123`
        - or a short identifier/slug, e.g. `my-data`
      placeholder: "my-data"
    validations:
      required: true

  - type: input
    id: dataset_title
    attributes:
      label: Dataset title
      description: Required. Human-readable dataset name.
      placeholder: "Test Dataset 001"
    validations:
      required: true

  - type: textarea
    id: dataset_description
    attributes:
      label: Dataset description
      description: Required. Brief description of the dataset.
      placeholder: "Minimal dataset for validating the new single-catalog model."
    validations:
      required: true

  - type: input
    id: publisher_ids
    attributes:
      label: Publisher IDs (optional, comma-separated)
      description: Optional. Existing Agent IDs.
      placeholder: "sdcdc:agent-test-001"
    validations:
      required: false

  - type: input
    id: contact_point_ids
    attributes:
      label: Contact Point IDs (optional, comma-separated)
      description: Optional. Existing Kind IDs.
      placeholder: "sdcdc:kind-test-001"
    validations:
      required: false

  - type: input
    id: license_ids
    attributes:
      label: License IDs (optional, comma-separated)
      description: Optional. Existing LicenseDocument IDs.
      placeholder: "sdcdc:license-test-001"
    validations:
      required: false

  - type: input
    id: temporal_ids
    attributes:
      label: Period IDs (optional, comma-separated)
      description: Optional. Existing PeriodOfTime IDs.
      placeholder: "sdcdc:period-test-001"
    validations:
      required: false

  - type: input
    id: series_ids
    attributes:
      label: Dataset Series IDs (optional, comma-separated)
      description: Optional. Existing DatasetSeries IDs.
      placeholder: "sdcdc:series-test-001"
    validations:
      required: false

  - type: input
    id: concept_ids
    attributes:
      label: Concept IDs (optional, comma-separated)
      description: Optional. Existing Concept IDs.
      placeholder: "sdcdc:concept-test-001"
    validations:
      required: false

  - type: input
    id: policy_ids
    attributes:
      label: Policy IDs (optional, comma-separated)
      description: Optional. Existing Policy IDs.
      placeholder: "sdcdc:policy-test-001"
    validations:
      required: false

  - type: textarea
    id: distributions
    attributes:
      label: Distributions (optional)
      description: |
        Optional. One distribution block per distribution.

        Required fields per block:
        - Format
        - Access URL

        Optional:
        - Issued
        - Title
        - Description

        Example:

        Title: CSV distribution
        Description: Main CSV export
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Title: API endpoint
        Format: api
        Access URL: https://example.com/api/data
      placeholder: |
        Title: CSV distribution
        Description: Main CSV export
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Title: API endpoint
        Format: api
        Access URL: https://example.com/api/data
    validations:
      required: false
