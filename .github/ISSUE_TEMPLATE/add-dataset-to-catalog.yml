name: Create a new data catalog
description: Create a new catalog and define the allowed use cases for datasets added later.
title: "[Create Catalog] "
labels: ["catalog-create", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: "Use this form to create a new catalog. The workflow will generate a unique Catalog ID and open a PR that creates `catalogs/<CATALOG-ID>.yaml`."

  - type: input
    id: catalog_name
    attributes:
      label: Catalog name
      description: "Human-friendly name (you can use spaces, hyphens, underscores, punctuation). A unique Catalog ID will be generated automatically."
      placeholder: "EPRI Europe - German_Node Datasets Volume-1"
    validations:
      required: true

  - type: textarea
    id: catalog_description
    attributes:
      label: Catalog description
      description: "Briefly describe what this catalog contains and how datasets in it should be interpreted."
      placeholder: "This catalog contains simulation datasets for ... (scope, assumptions, typical analyses, etc.)"
    validations:
      required: true

  - type: input
    id: catalog_use_cases
    attributes:
      label: Allowed use cases (comma-separated)
      description: "Comma-separated list of allowed use cases for this catalog. These will be used to validate dataset submissions."
      placeholder: "powerflow-analysis, fault-analysis, transient-stability-analysis"
    validations:
      required: true

  - type: input
    id: catalog_owner
    attributes:
      label: Catalog owner / organisation (optional)
      description: "Optional: who maintains this catalog."
      placeholder: "EPRI"
    validations:
      required: false

  - type: input
    id: catalog_contact
    attributes:
      label: Contact (optional)
      description: "Optional: email, team name, or URL."
      placeholder: "team@example.com"
    validations:
      required: false

  - type: markdown
    attributes:
      value: "After you submit, the bot will comment with the generated **Catalog ID**. Use that ID when adding datasets to this catalog."
