name: Add dataset to catalog
description: Add a new dataset to an existing catalog
title: "[Add Dataset] "
labels: ["catalog-add-dataset", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form to add a dataset to an existing catalog.

        If linking concepts, policies, or metrics, use existing IDs (comma-separated).

        For distributions, use one block per distribution in this format:

        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Leave a blank line between distributions.

        Allowed format values:
        - csv
        - text
        - txt
        - xlsx
        - xls
        - json
        - xml
        - ttl
        - rdf
        - parquet
        - zip
        - api

  - type: input
    id: catalog_id_existing
    attributes:
      label: Catalog ID (existing)
      description: "Required. Use the exact Catalog ID of the existing catalog."
      placeholder: "A-SF0JMV"
    validations:
      required: true

  - type: input
    id: dataset_identifier
    attributes:
      label: Dataset identifier
      description: "Required. Short dataset ID or full ID. If you enter a short ID, it will be normalized."
      placeholder: "test"
    validations:
      required: true

  - type: input
    id: dataset_title
    attributes:
      label: Dataset title
      description: "Required. Human-readable dataset name."
      placeholder: "Voltage measurements"
    validations:
      required: true

  - type: textarea
    id: dataset_description
    attributes:
      label: Dataset description
      description: "Required. Brief description of the dataset."
      placeholder: "Distribution grid voltage measurements for feeder A."
    validations:
      required: true

  - type: input
    id: dataset_use_case
    attributes:
      label: Dataset use case
      description: "Required. Must match one of the allowed catalog use cases."
      placeholder: "a-a"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Geographical Location (high-level)
      description: "Required. High-level geographic location."
      placeholder: "Dublin, Ireland"
    validations:
      required: true

  - type: input
    id: concept_ids
    attributes:
      label: Concept IDs (optional, comma-separated)
      description: "Optional. Use existing concept IDs, comma-separated."
      placeholder: "sdcdc:concept-voltage-2H4KL0, sdcdc:concept-harmonics-7QX1P9"
    validations:
      required: false

  - type: input
    id: policy_ids
    attributes:
      label: Policy IDs (optional, comma-separated)
      description: "Optional. Use existing policy IDs, comma-separated."
      placeholder: "sdcdc:policy-open-information-policy-7B9QX2"
    validations:
      required: false

  - type: input
    id: metric_ids
    attributes:
      label: Metric IDs (optional, comma-separated)
      description: "Optional. Use existing metric IDs, comma-separated."
      placeholder: "sdcdc:metric-voltage-quality-5M1ZP8"
    validations:
      required: false

  - type: textarea
    id: distributions
    attributes:
      label: Distributions (optional)
      description: |
        Optional. One distribution block per distribution.

        Required fields per block:
        - Format
        - Access URL
        - Issued

        Format:
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11
      placeholder: |
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Format: xlsx
        Access URL: https://example.com/data.xlsx
        Issued: 2026-06-12
    validations:
      required: false
