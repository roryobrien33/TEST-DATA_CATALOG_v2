name: Remove dataset from catalog
description: Remove an existing dataset from an existing catalog
title: "[Remove Dataset] "
labels: ["catalog-remove-dataset", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form to remove an existing dataset from a catalog.

        You must provide:
        - the exact **Catalog ID**
        - the exact **Dataset identifier**

        This will remove the dataset from the source catalog YAML and create a pull request.

  - type: input
    id: catalog_id_existing
    attributes:
      label: Catalog ID (existing)
      description: "Required. Use the exact Catalog ID of the existing catalog."
      placeholder: "A-SF0JMV"
    validations:
      required: true

  - type: input
    id: dataset_identifier
    attributes:
      label: Dataset identifier
      description: "Required. Use the exact dataset identifier to remove."
      placeholder: "sdcdc:A-SF0JMV-test"
    validations:
      required: true
