                  "description": policy_description,
              }
          }

          p.write_text(
              yaml.safe_dump(doc, sort_keys=False, allow_unicode=True),
              encoding="utf-8"
          )
          print(f"Wrote policy file: {p}")
          PY
        env:
          POLICY_ID: ${{ steps.parse.outputs.policy_id_F }}
          POLICY_TITLE: ${{ steps.parse.outputs.policy_title_F }}
          POLICY_DESCRIPTION: ${{ steps.parse.outputs.policy_description_F }}

      - name: Create metric YAML
        if: ${{ steps.parse.outputs.is_create_metric == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p data-catalog/metrics

          python - <<'PY'
          import os
          import pathlib
          import re
          import yaml

          metric_id = os.environ["METRIC_ID"].strip()
          metric_pref_label = os.environ["METRIC_PREF_LABEL"].strip()
          metric_definition = os.environ["METRIC_DEFINITION"].strip()
          metric_expected_data_type = os.environ.get("METRIC_EXPECTED_DATA_TYPE", "").strip()
          metric_dimension = os.environ.get("METRIC_DIMENSION", "").strip()

          def file_stem_from_id(value: str) -> str:
              s = value.strip()
              if ":" in s:
                  s = s.split(":", 1)[1]
              if "/" in s:
                  s = s.rstrip("/").split("/")[-1]
              if "#" in s:
