              return s

          file_stem = file_stem_from_id(policy_id)
          p = pathlib.Path(f"data-catalog/policies/{file_stem}.yaml")
          p.parent.mkdir(parents=True, exist_ok=True)

          if p.exists():
              raise SystemExit(f"Policy file already exists: {p}")

          doc = {
              "policy": {
                  "uid": policy_id,
