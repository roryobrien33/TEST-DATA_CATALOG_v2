name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'catalog-create') ||
      contains(github.event.issue.labels.*.name, 'catalog-add-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-edit-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-remove-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-create-concept') ||
      contains(github.event.issue.labels.*.name, 'catalog-create-policy') ||
      contains(github.event.issue.labels.*.name, 'catalog-create-metric')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Parse Issue Form fields
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";

            function escapeRegExp(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getField(heading) {
              const h = escapeRegExp(heading);
              const re = new RegExp("###\\s+" + h + "\\s*\\n([\\s\\S]*?)(?=\\n###\\s+|$)", "i");
              const m = body.match(re);
              if (!m) return "";
              return m[1].trim().replace(/^_No response_$/i, "").trim();
            }

            function normalizeIdBase(name) {
              return name
                .trim()
                .toUpperCase()
                .replace(/[\s\-_]+/g, "-")
                .replace(/[^A-Z0-9-]/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");
            }

            function slugify(name) {
              return name
                .trim()
                .toLowerCase()
                .replace(/[\s_]+/g, "-")
                .replace(/[^a-z0-9-]/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");
            }

            function randomToken6() {
              const n = Math.floor(Math.random() * (36 ** 6));
              return n.toString(36).toUpperCase().padStart(6, "0");
            }

            function normalizeUseCase(s) {
              return s
                .trim()
                .toLowerCase()
                .replace(/[\s_]+/g, "-")
                .replace(/[^a-z0-9-]/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");
            }

            function parseUseCases(raw) {
              if (!raw) return [];
              return raw
                .split(",")
                .map(x => normalizeUseCase(x))
                .filter(Boolean);
            }

            function normalizeConceptId(raw) {
              const s = (raw || "").trim();
              if (!s) return "";
              if (s.startsWith("http://") || s.startsWith("https://")) return s;
              if (s.includes(":")) return s;
              return `sdcdc:${s}`;
            }

            function parseConceptIdCsv(raw) {
              if (!raw) return [];
              return raw
                .split(",")
                .map(x => normalizeConceptId(x))
                .filter(Boolean);
            }

            function normalizePolicyId(raw) {
              const s = (raw || "").trim();
              if (!s) return "";
              if (s.startsWith("http://") || s.startsWith("https://")) return s;
              if (s.includes(":")) return s;
              return `plcy:${s}`;
            }

            function normalizeMetricId(raw) {
              const s = (raw || "").trim();
              if (!s) return "";
              if (s.startsWith("http://") || s.startsWith("https://")) return s;
              if (s.includes(":")) return s;
              return `sdcdc:${s}`;
            }

            const labels = (context.payload.issue.labels || []).map(l => l.name);

            const isCreateCatalog = labels.includes("catalog-create");
            const isAddDataset = labels.includes("catalog-add-dataset");
            const isEditDataset = labels.includes("catalog-edit-dataset");
            const isRemoveDataset = labels.includes("catalog-remove-dataset");
            const isCreateConcept = labels.includes("catalog-create-concept");
            const isCreatePolicy = labels.includes("catalog-create-policy");
            const isCreateMetric = labels.includes("catalog-create-metric");

            // Create catalog fields
            const catalog_name_A = getField("Catalog name");
            const catalog_description_A = getField("Catalog description");
            const catalog_use_cases_A = getField("Allowed use cases (comma-separated)");
            const catalog_owner_A = getField("Catalog owner / organisation (optional)");
            const catalog_contact_A = getField("Contact (optional)");

            // Add dataset fields
            const catalog_id_existing_B = getField("Catalog ID (existing)");
            const dataset_identifier_B = getField("Dataset identifier");
            const dataset_title_B = getField("Dataset title");
            const dataset_description_B = getField("Dataset description");
            const dataset_use_case_B = getField("Dataset use case");
            const location_B = getField("Geographical Location (high-level)");
            const concepts_B = getField("Concept IDs (optional, comma-separated)");
            const distributions_B = getField("Distribution links (optional)");

            // Edit dataset fields
            const catalog_id_existing_C = getField("Catalog ID (existing)");
            const dataset_identifier_C = getField("Dataset identifier");
            const dataset_title_C = getField("Dataset title (optional)");
            const dataset_description_C = getField("Dataset description (optional)");
            const dataset_use_case_C = getField("Dataset use case (optional)");
            const location_C = getField("Geographical Location (high-level) (optional)");
            const concepts_C = getField("Concept IDs (optional, comma-separated)");
            const distributions_C = getField("Distribution links (optional)");

            // Remove dataset fields
            const catalog_id_existing_D = getField("Catalog ID (existing)");
            const dataset_identifier_D = getField("Dataset identifier");

            // Create concept fields
            const concept_id_E = getField("Concept ID (optional)");
            const concept_pref_label_E = getField("Concept preferred label");
            const concept_definition_E = getField("Concept definition");
            const concept_alt_label_E = getField("Concept alternative label (optional)");
            const concept_example_E = getField("Concept example (optional)");
            const relationship_type_E = getField("Relationship type");
            const parent_concept_id_E = getField("Parent concept ID (required if child concept)");
            const child_concept_ids_E = getField("Child concept IDs (optional if parent concept)");

            // Create policy fields
            const policy_id_F = getField("Policy ID (optional)");
            const policy_title_F = getField("Policy title");
            const policy_description_F = getField("Policy description");

            // Create metric fields
            const metric_id_G = getField("Metric ID (optional)");
            const metric_pref_label_G = getField("Metric preferred label");
            const metric_definition_G = getField("Metric definition");
            const metric_expected_data_type_G = getField("Expected data type (optional)");
            const metric_dimension_G = getField("Metric dimension (optional)");

            const errors = [];

            if (isCreateCatalog) {
              if (!catalog_name_A) errors.push("Missing: Catalog name");
              if (!catalog_description_A) errors.push("Missing: Catalog description");
              if (!catalog_use_cases_A) errors.push("Missing: Allowed use cases (comma-separated)");

              const base = catalog_name_A ? normalizeIdBase(catalog_name_A) : "";
              if (catalog_name_A && !base) {
                errors.push("Catalog name produced an empty Catalog ID after normalization.");
              }

              const ucs = parseUseCases(catalog_use_cases_A);
              if (catalog_use_cases_A && ucs.length === 0) {
                errors.push("Allowed use cases list is empty after normalization (check commas/spelling).");
              }
            }

            if (isAddDataset) {
              if (!catalog_id_existing_B) errors.push("Missing: Catalog ID (existing)");
              if (!dataset_identifier_B) errors.push("Missing: Dataset identifier");
              if (!dataset_title_B) errors.push("Missing: Dataset title");
              if (!dataset_description_B) errors.push("Missing: Dataset description");
              if (!dataset_use_case_B) errors.push("Missing: Dataset use case");
              if (!location_B) errors.push("Missing: Geographical Location (high-level)");
            }

            if (isEditDataset) {
              if (!catalog_id_existing_C) errors.push("Missing: Catalog ID (existing)");
              if (!dataset_identifier_C) errors.push("Missing: Dataset identifier");

              const hasAnyEdit =
                !!dataset_title_C ||
                !!dataset_description_C ||
                !!dataset_use_case_C ||
                !!location_C ||
                !!concepts_C ||
                !!distributions_C;

              if (!hasAnyEdit) {
                errors.push("No editable fields were provided. Fill at least one optional field to update the dataset.");
              }
            }

            if (isRemoveDataset) {
              if (!catalog_id_existing_D) errors.push("Missing: Catalog ID (existing)");
              if (!dataset_identifier_D) errors.push("Missing: Dataset identifier");
            }

            if (isCreateConcept) {
              if (!concept_pref_label_E) errors.push("Missing: Concept preferred label");
              if (!concept_definition_E) errors.push("Missing: Concept definition");

              const rel = (relationship_type_E || "").trim().toLowerCase();
              if (rel === "child concept" && !parent_concept_id_E) {
                errors.push("Missing: Parent concept ID (required if Relationship type = Child concept)");
              }
            }

            if (isCreatePolicy) {
              if (!policy_title_F) errors.push("Missing: Policy title");
              if (!policy_description_F) errors.push("Missing: Policy description");
            }

            if (isCreateMetric) {
              if (!metric_pref_label_G) errors.push("Missing: Metric preferred label");
              if (!metric_definition_G) errors.push("Missing: Metric definition");
            }

            let generated_catalog_id = "";
            if (isCreateCatalog && catalog_name_A) {
              const base = normalizeIdBase(catalog_name_A);
              generated_catalog_id = base + "-" + randomToken6();
            }

            let generated_concept_id = "";
            if (isCreateConcept && concept_pref_label_E) {
              generated_concept_id = concept_id_E
                ? normalizeConceptId(concept_id_E)
                : `sdcdc:concept-${slugify(concept_pref_label_E)}`;
            }

            let generated_policy_id = "";
            if (isCreatePolicy && policy_title_F) {
              generated_policy_id = policy_id_F
                ? normalizePolicyId(policy_id_F)
                : `plcy:${slugify(policy_title_F)}`;
            }

            let generated_metric_id = "";
            if (isCreateMetric && metric_pref_label_G) {
              generated_metric_id = metric_id_G
                ? normalizeMetricId(metric_id_G)
                : `sdcdc:metric-${slugify(metric_pref_label_G)}`;
            }

            const normalized_parent_concept_id_E = normalizeConceptId(parent_concept_id_E);
            const normalized_child_concept_ids_E = parseConceptIdCsv(child_concept_ids_E);

            core.setOutput("errors", JSON.stringify(errors));

            core.setOutput("is_create_catalog", String(isCreateCatalog));
            core.setOutput("is_add_dataset", String(isAddDataset));
            core.setOutput("is_edit_dataset", String(isEditDataset));
            core.setOutput("is_remove_dataset", String(isRemoveDataset));
            core.setOutput("is_create_concept", String(isCreateConcept));
            core.setOutput("is_create_policy", String(isCreatePolicy));
            core.setOutput("is_create_metric", String(isCreateMetric));

            core.setOutput("catalog_name_A", catalog_name_A);
            core.setOutput("catalog_description_A", catalog_description_A);
            core.setOutput("catalog_use_cases_A", catalog_use_cases_A);
            core.setOutput("catalog_owner_A", catalog_owner_A);
            core.setOutput("catalog_contact_A", catalog_contact_A);
            core.setOutput("generated_catalog_id", generated_catalog_id);

            core.setOutput("catalog_id_existing_B", catalog_id_existing_B);
            core.setOutput("dataset_identifier_B", dataset_identifier_B);
            core.setOutput("dataset_title_B", dataset_title_B);
            core.setOutput("dataset_description_B", dataset_description_B);
            core.setOutput("dataset_use_case_B", dataset_use_case_B);
            core.setOutput("location_B", location_B);
            core.setOutput("concepts_B", concepts_B);
            core.setOutput("distributions_B", distributions_B);

            core.setOutput("catalog_id_existing_C", catalog_id_existing_C);
            core.setOutput("dataset_identifier_C", dataset_identifier_C);
            core.setOutput("dataset_title_C", dataset_title_C);
            core.setOutput("dataset_description_C", dataset_description_C);
            core.setOutput("dataset_use_case_C", dataset_use_case_C);
            core.setOutput("location_C", location_C);
            core.setOutput("concepts_C", concepts_C);
            core.setOutput("distributions_C", distributions_C);

            core.setOutput("catalog_id_existing_D", catalog_id_existing_D);
            core.setOutput("dataset_identifier_D", dataset_identifier_D);

            core.setOutput("concept_id_E", generated_concept_id);
            core.setOutput("concept_pref_label_E", concept_pref_label_E);
            core.setOutput("concept_definition_E", concept_definition_E);
            core.setOutput("concept_alt_label_E", concept_alt_label_E);
            core.setOutput("concept_example_E", concept_example_E);
            core.setOutput("relationship_type_E", relationship_type_E);
            core.setOutput("parent_concept_id_E", normalized_parent_concept_id_E);
            core.setOutput("child_concept_ids_E", JSON.stringify(normalized_child_concept_ids_E));

            core.setOutput("policy_id_F", generated_policy_id);
            core.setOutput("policy_title_F", policy_title_F);
            core.setOutput("policy_description_F", policy_description_F);

            core.setOutput("metric_id_G", generated_metric_id);
            core.setOutput("metric_pref_label_G", metric_pref_label_G);
            core.setOutput("metric_definition_G", metric_definition_G);
            core.setOutput("metric_expected_data_type_G", metric_expected_data_type_G);
            core.setOutput("metric_dimension_G", metric_dimension_G);

      - name: Comment and stop on validation errors
        if: ${{ fromJSON(steps.parse.outputs.errors)[0] != null }}
        uses: actions/github-script@v8
        with:
          script: |
            const errors = JSON.parse(`${{ steps.parse.outputs.errors }}`);
            const msg =
              "Catalog intake validation failed\n\n" +
              errors.map(e => "- " + e).join("\n") +
              "\n\nPlease edit the issue to fix these fields, then the workflow will re-run.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: msg
            });
            core.setFailed("Validation failed");

      - name: Comment generated Catalog ID
        if: ${{ steps.parse.outputs.is_create_catalog == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Generated Catalog ID: `${{ steps.parse.outputs.generated_catalog_id }}`"
            });

      - name: Comment concept ID
        if: ${{ steps.parse.outputs.is_create_concept == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Concept ID: `${{ steps.parse.outputs.concept_id_E }}`"
            });

      - name: Comment policy ID
        if: ${{ steps.parse.outputs.is_create_policy == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Policy ID: `${{ steps.parse.outputs.policy_id_F }}`"
            });

      - name: Comment metric ID
        if: ${{ steps.parse.outputs.is_create_metric == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Metric ID: `${{ steps.parse.outputs.metric_id_G }}`"
            });

      - name: Create catalog YAML
        if: ${{ steps.parse.outputs.is_create_catalog == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p data-catalog/user-catalogs

          python - <<'PY'
          import os
          import re
          import pathlib
          import yaml

          catalog_id = os.environ["CATALOG_ID"]
          catalog_name = os.environ["CATALOG_NAME"]
          catalog_description = os.environ["CATALOG_DESCRIPTION"]
          raw_use_cases = os.environ["CATALOG_USE_CASES"]
          owner = os.environ.get("CATALOG_OWNER", "").strip()
          contact = os.environ.get("CATALOG_CONTACT", "").strip()

          def norm_use_case(s: str) -> str:
              s = s.strip().lower()
              s = re.sub(r"[\s_]+", "-", s)
              s = re.sub(r"[^a-z0-9-]", "-", s)
              s = re.sub(r"-+", "-", s).strip("-")
              return s

          use_cases = [norm_use_case(x) for x in raw_use_cases.split(",")]
          use_cases = [x for x in use_cases if x]

          p = pathlib.Path(f"data-catalog/user-catalogs/{catalog_id}.yaml")
          p.parent.mkdir(parents=True, exist_ok=True)

          if p.exists():
              raise SystemExit(f"Catalog file already exists: {p}")

          doc = {
              "catalog": {
                  "id": catalog_id,
                  "title": catalog_name,
                  "description": catalog_description,
                  "version": 1,
                  "use_cases": use_cases,
              },
              "datasets": []
          }

          if owner:
              doc["catalog"]["owner"] = owner
          if contact:
              doc["catalog"]["contact"] = contact

          p.write_text(yaml.safe_dump(doc, sort_keys=False, allow_unicode=True), encoding="utf-8")
          print(f"Wrote: {p}")
          PY
        env:
          CATALOG_ID: ${{ steps.parse.outputs.generated_catalog_id }}
          CATALOG_NAME: ${{ steps.parse.outputs.catalog_name_A }}
          CATALOG_DESCRIPTION: ${{ steps.parse.outputs.catalog_description_A }}
          CATALOG_USE_CASES: ${{ steps.parse.outputs.catalog_use_cases_A }}
          CATALOG_OWNER: ${{ steps.parse.outputs.catalog_owner_A }}
          CATALOG_CONTACT: ${{ steps.parse.outputs.catalog_contact_A }}

      - name: Add dataset to catalog YAML
        if: ${{ steps.parse.outputs.is_add_dataset == 'true' }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import re
          import pathlib
          import yaml

          catalog_id = os.environ["CATALOG_ID_EXISTING"].strip()
          dataset_identifier_raw = os.environ["DATASET_IDENTIFIER"].strip()
          dataset_title = os.environ["DATASET_TITLE"].strip()
          dataset_description = os.environ["DATASET_DESCRIPTION"].strip()
          dataset_use_case_raw = os.environ["DATASET_USE_CASE"].strip()
          location = os.environ["LOCATION"].strip()
          concepts_raw = os.environ.get("CONCEPTS", "").strip()
          distributions_raw = os.environ.get("DISTRIBUTIONS", "").strip()

          p = pathlib.Path(f"data-catalog/user-catalogs/{catalog_id}.yaml")
          if not p.exists():
              raise SystemExit(f"Catalog not found: {p}")

          doc = yaml.safe_load(p.read_text(encoding="utf-8")) or {}
          catalog = doc.get("catalog", {}) or {}
          datasets = doc.get("datasets", [])
          if datasets is None:
              datasets = []
          if not isinstance(datasets, list):
              raise SystemExit("Invalid catalog YAML structure: datasets must be a list")

          def norm_use_case(s: str) -> str:
              s = s.strip().lower()
              s = re.sub(r"[\s_]+", "-", s)
              s = re.sub(r"[^a-z0-9-]", "-", s)
              s = re.sub(r"-+", "-", s).strip("-")
              return s

          def ensure_catalog_scoped_dataset_id(catalog_id_value: str, dataset_id_value: str) -> str:
              s = dataset_id_value.strip()
              if not s:
                  return s
              if s.startswith("http://") or s.startswith("https://"):
                  return s
              if ":" in s:
                  return s
              return f"sdcdc:{catalog_id_value}-{s}"

          dataset_identifier = ensure_catalog_scoped_dataset_id(catalog_id, dataset_identifier_raw)
          dataset_use_case = norm_use_case(dataset_use_case_raw)

          allowed = catalog.get("use_cases", []) or []
          if dataset_use_case not in allowed:
              raise SystemExit(
                  f"Use case not allowed for this catalog. Provided: '{dataset_use_case_raw}' "
                  f"(normalized: '{dataset_use_case}'). Allowed: {', '.join(allowed)}"
              )

          for ds in datasets:
              ds_id = ds.get("id") or ds.get("identifier")
              if ds_id == dataset_identifier:
                  raise SystemExit(f"Dataset identifier already exists in catalog: {dataset_identifier}")

          concepts = [x.strip() for x in concepts_raw.split(",") if x.strip()]
          distributions = [x.strip() for x in distributions_raw.splitlines() if x.strip()]

          new_ds = {
              "id": dataset_identifier,
              "title": dataset_title,
              "description": dataset_description,
              "use_case": dataset_use_case,
              "location": location,
          }

          if concepts:
              new_ds["concepts"] = concepts
          if distributions:
              new_ds["distributions"] = distributions

          datasets.append(new_ds)
          doc["datasets"] = datasets

          p.write_text(yaml.safe_dump(doc, sort_keys=False, allow_unicode=True), encoding="utf-8")
          print(f"Updated: {p}")
          PY
        env:
          CATALOG_ID_EXISTING: ${{ steps.parse.outputs.catalog_id_existing_B }}
          DATASET_IDENTIFIER: ${{ steps.parse.outputs.dataset_identifier_B }}
          DATASET_TITLE: ${{ steps.parse.outputs.dataset_title_B }}
          DATASET_DESCRIPTION: ${{ steps.parse.outputs.dataset_description_B }}
          DATASET_USE_CASE: ${{ steps.parse.outputs.dataset_use_case_B }}
          LOCATION: ${{ steps.parse.outputs.location_B }}
          CONCEPTS: ${{ steps.parse.outputs.concepts_B }}
          DISTRIBUTIONS: ${{ steps.parse.outputs.distributions_B }}

      - name: Edit dataset in catalog YAML
        if: ${{ steps.parse.outputs.is_edit_dataset == 'true' }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import re
          import pathlib
          import yaml

          catalog_id = os.environ["CATALOG_ID_EXISTING"].strip()
          dataset_identifier_raw = os.environ["DATASET_IDENTIFIER"].strip()
          dataset_title = os.environ.get("DATASET_TITLE", "").strip()
          dataset_description = os.environ.get("DATASET_DESCRIPTION", "").strip()
          dataset_use_case_raw = os.environ.get("DATASET_USE_CASE", "").strip()
          location = os.environ.get("LOCATION", "").strip()
          concepts_raw = os.environ.get("CONCEPTS", "").strip()
          distributions_raw = os.environ.get("DISTRIBUTIONS", "").strip()

          p = pathlib.Path(f"data-catalog/user-catalogs/{catalog_id}.yaml")
          if not p.exists():
              raise SystemExit(f"Catalog not found: {p}")

          doc = yaml.safe_load(p.read_text(encoding="utf-8")) or {}
          catalog = doc.get("catalog", {}) or {}
          datasets = doc.get("datasets", [])
          if datasets is None:
              datasets = []
          if not isinstance(datasets, list):
              raise SystemExit("Invalid catalog YAML structure: datasets must be a list")

          def norm_use_case(s: str) -> str:
              s = s.strip().lower()
              s = re.sub(r"[\s_]+", "-", s)
              s = re.sub(r"[^a-z0-9-]", "-", s)
              s = re.sub(r"-+", "-", s).strip("-")
              return s

          def ensure_catalog_scoped_dataset_id(catalog_id_value: str, dataset_id_value: str) -> str:
              s = dataset_id_value.strip()
              if not s:
                  return s
              if s.startswith("http://") or s.startswith("https://"):
                  return s
              if ":" in s:
                  return s
              return f"sdcdc:{catalog_id_value}-{s}"

          dataset_identifier = ensure_catalog_scoped_dataset_id(catalog_id, dataset_identifier_raw)

          target = None
          for ds in datasets:
              ds_id = ds.get("id") or ds.get("identifier")
              if ds_id == dataset_identifier:
                  target = ds
                  break

          if target is None:
              raise SystemExit(f"Dataset not found in catalog: {dataset_identifier}")

          if dataset_title:
              target["title"] = dataset_title

          if dataset_description:
              target["description"] = dataset_description

          if dataset_use_case_raw:
              dataset_use_case = norm_use_case(dataset_use_case_raw)
              allowed = catalog.get("use_cases", []) or []
              if dataset_use_case not in allowed:
                raise SystemExit(
                  f"Use case not allowed for this catalog. Provided: '{dataset_use_case_raw}' "
                  f"(normalized: '{dataset_use_case}'). Allowed: {', '.join(allowed)}"
                )
              target["use_case"] = dataset_use_case

          if location:
              target["location"] = location

          if concepts_raw:
              target["concepts"] = [x.strip() for x in concepts_raw.split(",") if x.strip()]

          if distributions_raw:
              target["distributions"] = [x.strip() for x in distributions_raw.splitlines() if x.strip()]

          p.write_text(yaml.safe_dump(doc, sort_keys=False, allow_unicode=True), encoding="utf-8")
          print(f"Updated: {p}")
          PY
        env:
          CATALOG_ID_EXISTING: ${{ steps.parse.outputs.catalog_id_existing_C }}
          DATASET_IDENTIFIER: ${{ steps.parse.outputs.dataset_identifier_C }}
          DATASET_TITLE: ${{ steps.parse.outputs.dataset_title_C }}
          DATASET_DESCRIPTION: ${{ steps.parse.outputs.dataset_description_C }}
          DATASET_USE_CASE: ${{ steps.parse.outputs.dataset_use_case_C }}
          LOCATION: ${{ steps.parse.outputs.location_C }}
          CONCEPTS: ${{ steps.parse.outputs.concepts_C }}
          DISTRIBUTIONS: ${{ steps.parse.outputs.distributions_C }}

      - name: Remove dataset from catalog YAML
        if: ${{ steps.parse.outputs.is_remove_dataset == 'true' }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import pathlib
          import yaml
          import datetime

          catalog_id = os.environ["CATALOG_ID_EXISTING"].strip()
          dataset_identifier_raw = os.environ["DATASET_IDENTIFIER"].strip()

          p = pathlib.Path(f"data-catalog/user-catalogs/{catalog_id}.yaml")
          if not p.exists():
              raise SystemExit(f"Catalog not found: {p}")

          doc = yaml.safe_load(p.read_text(encoding="utf-8")) or {}

          datasets = doc.get("datasets", [])
          if datasets is None:
              datasets = []
          if not isinstance(datasets, list):
              raise SystemExit("Invalid catalog YAML structure: datasets must be a list")

          deleted_datasets = doc.get("deleted_datasets", [])
          if deleted_datasets is None:
              deleted_datasets = []
          if not isinstance(deleted_datasets, list):
              raise SystemExit("Invalid catalog YAML structure: deleted_datasets must be a list")

          def ensure_catalog_scoped_dataset_id(catalog_id_value: str, dataset_id_value: str) -> str:
              s = dataset_id_value.strip()
              if not s:
                  return s
              if s.startswith("http://") or s.startswith("https://"):
                  return s
              if ":" in s:
                  return s
              return f"sdcdc:{catalog_id_value}-{s}"

          dataset_identifier = ensure_catalog_scoped_dataset_id(catalog_id, dataset_identifier_raw)

          removed_dataset = None
          kept_datasets = []

          for ds in datasets:
              ds_id = ds.get("id") or ds.get("identifier")
              if ds_id == dataset_identifier and removed_dataset is None:
                  removed_dataset = ds
              else:
                  kept_datasets.append(ds)

          if removed_dataset is None:
              raise SystemExit(f"Dataset not found in catalog: {dataset_identifier}")

          tombstone = {
              "id": removed_dataset.get("id") or removed_dataset.get("identifier") or dataset_identifier,
              "title": removed_dataset.get("title", ""),
              "description": removed_dataset.get("description", ""),
              "deleted_at": datetime.date.today().isoformat(),
          }

          already_logged = any(
              isinstance(item, dict) and str(item.get("id", "")).strip() == tombstone["id"]
              for item in deleted_datasets
          )

          if not already_logged:
              deleted_datasets.append(tombstone)

          doc["datasets"] = kept_datasets
          doc["deleted_datasets"] = deleted_datasets

          p.write_text(
              yaml.safe_dump(doc, sort_keys=False, allow_unicode=True),
              encoding="utf-8"
          )
          print(f"Removed dataset {dataset_identifier} from {catalog_id} and recorded it in deleted_datasets")
          PY
        env:
          CATALOG_ID_EXISTING: ${{ steps.parse.outputs.catalog_id_existing_D }}
          DATASET_IDENTIFIER: ${{ steps.parse.outputs.dataset_identifier_D }}

      - name: Create concept YAML
        if: ${{ steps.parse.outputs.is_create_concept == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p data-catalog/concepts

          python - <<'PY'
          import os
          import pathlib
          import re
          import yaml
          import json

          concept_id = os.environ["CONCEPT_ID"].strip()
          concept_pref_label = os.environ["CONCEPT_PREF_LABEL"].strip()
          concept_definition = os.environ["CONCEPT_DEFINITION"].strip()
          concept_alt_label = os.environ.get("CONCEPT_ALT_LABEL", "").strip()
          concept_example = os.environ.get("CONCEPT_EXAMPLE", "").strip()
          relationship_type = os.environ.get("RELATIONSHIP_TYPE", "").strip().lower()
          parent_concept_id = os.environ.get("PARENT_CONCEPT_ID", "").strip()
          child_concept_ids = json.loads(os.environ.get("CHILD_CONCEPT_IDS", "[]"))

          def file_stem_from_id(value: str) -> str:
              s = value.strip()
              if ":" in s:
                  s = s.split(":", 1)[1]
              if "/" in s:
                  s = s.rstrip("/").split("/")[-1]
              if "#" in s:
                  s = s.split("#")[-1]
              s = re.sub(r"[^A-Za-z0-9._-]", "-", s)
              return s

          file_stem = file_stem_from_id(concept_id)
          p = pathlib.Path(f"data-catalog/concepts/{file_stem}.yaml")
          p.parent.mkdir(parents=True, exist_ok=True)

          if p.exists():
              raise SystemExit(f"Concept file already exists: {p}")

          doc = {
              "concept": {
                  "identifier": concept_id,
                  "prefLabel": concept_pref_label,
                  "definition": concept_definition,
              }
          }

          if concept_alt_label:
              doc["concept"]["altLabel"] = concept_alt_label

          if concept_example:
              doc["concept"]["example"] = concept_example

          if relationship_type == "child concept" and parent_concept_id:
              doc["concept"]["broader"] = parent_concept_id

          if relationship_type == "parent concept" and child_concept_ids:
              doc["concept"]["narrower"] = child_concept_ids

          p.write_text(
              yaml.safe_dump(doc, sort_keys=False, allow_unicode=True),
              encoding="utf-8"
          )
          print(f"Wrote concept file: {p}")
          PY
        env:
          CONCEPT_ID: ${{ steps.parse.outputs.concept_id_E }}
          CONCEPT_PREF_LABEL: ${{ steps.parse.outputs.concept_pref_label_E }}
          CONCEPT_DEFINITION: ${{ steps.parse.outputs.concept_definition_E }}
          CONCEPT_ALT_LABEL: ${{ steps.parse.outputs.concept_alt_label_E }}
          CONCEPT_EXAMPLE: ${{ steps.parse.outputs.concept_example_E }}
          RELATIONSHIP_TYPE: ${{ steps.parse.outputs.relationship_type_E }}
          PARENT_CONCEPT_ID: ${{ steps.parse.outputs.parent_concept_id_E }}
          CHILD_CONCEPT_IDS: ${{ steps.parse.outputs.child_concept_ids_E }}

