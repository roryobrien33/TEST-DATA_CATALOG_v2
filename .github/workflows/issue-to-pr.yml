          print(f"Wrote metric file: {p}")
          PY
        env:
          METRIC_ID: ${{ steps.parse.outputs.metric_id_G }}
          METRIC_PREF_LABEL: ${{ steps.parse.outputs.metric_pref_label_G }}
          METRIC_DEFINITION: ${{ steps.parse.outputs.metric_definition_G }}
          METRIC_EXPECTED_DATA_TYPE: ${{ steps.parse.outputs.metric_expected_data_type_G }}
          METRIC_DIMENSION: ${{ steps.parse.outputs.metric_dimension_G }}


      - name: Show pending changes
        if: ${{ success() }}
