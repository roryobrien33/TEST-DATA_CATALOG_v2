name: Issue Forms → Catalog YAML → PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'catalog-create') ||
      contains(github.event.issue.labels.*.name, 'catalog-add-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-edit-dataset')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Parse Issue Form fields
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";
            const labels = (context.payload.issue.labels || []).map(l => l.name);

            const isCreateCatalog = labels.includes("catalog-create");
            const isAddDataset = labels.includes("catalog-add-dataset");
            const isEditDataset = labels.includes("catalog-edit-dataset");

            core.setOutput("errors", JSON.stringify([]));
            core.setOutput("is_create_catalog", String(isCreateCatalog));
            core.setOutput("is_add_dataset", String(isAddDataset));
            core.setOutput("is_edit_dataset", String(isEditDataset));

            core.setOutput("catalog_name_A", "");
            core.setOutput("catalog_description_A", "");
            core.setOutput("catalog_use_cases_A", "");
            core.setOutput("catalog_owner_A", "");
            core.setOutput("catalog_contact_A", "");
            core.setOutput("generated_catalog_id", "");

            core.setOutput("catalog_id_existing_B", "");
            core.setOutput("dataset_identifier_B", "");
            core.setOutput("dataset_title_B", "");
            core.setOutput("dataset_description_B", "");
            core.setOutput("dataset_use_case_B", "");
            core.setOutput("location_B", "");
            core.setOutput("concepts_B", "");
            core.setOutput("distributions_B", "");

            core.setOutput("catalog_id_existing_C", "");
            core.setOutput("dataset_identifier_C", "");
            core.setOutput("dataset_title_C", "");
            core.setOutput("dataset_description_C", "");
            core.setOutput("dataset_use_case_C", "");
            core.setOutput("location_C", "");
            core.setOutput("concepts_C", "");
            core.setOutput("distributions_C", "");

            console.log("Parse step syntax is valid.");

      - name: Comment parse-step success
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "✅ Parse step syntax test passed. The `actions/github-script` block is valid JavaScript."
            });

      - name: Stop after parse test
        run: |
          echo "Diagnostic workflow completed successfully."
``
