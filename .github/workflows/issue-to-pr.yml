name: Issue Form → Catalog YAML → PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: contains(github.event.issue.labels.*.name, 'catalog-intake')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse Issue Form fields + Generate Catalog ID
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";

            function getField(heading) {
              const re = new RegExp(`###\\s+${heading}\\s*\\n([\\s\\S]*?)(?=\\n###\\s+|$)`, "i");
              const m = body.match(re);
              if (!m) return "";
              return m[1].trim().replace(/^_No response_$/i, "").trim();
            }

            // These headings MUST match the Issue Form labels exactly
            const catalog_action = getField("Catalog action");
            const catalog_name = getField("Catalog name");
            const catalog_title = getField("Catalog title (required if creating a new catalog)");
            const catalog_description = getField("Catalog description (required if creating a new catalog)");
            const dataset_title = getField("Dataset title");
            const dataset_description = getField("Dataset description");
            const use_case = getField("Use case");
            const location = getField("Location (high-level)");
            const concepts = getField("Concepts / tags (optional)");
            const distributions = getField("Distribution links (optional)");

            // Normalize base: separators -> hyphen; uppercase; keep A-Z0-9-
            function normalizeBase(name) {
              return name
                .trim()
                .toUpperCase()
                .replace(/[\s\-_]+/g, "-")     // space/_/- runs => "-"
                .replace(/[^A-Z0-9-]/g, "-")   // other punctuation => "-"
                .replace(/-+/g, "-")           // collapse hyphens
                .replace(/^-|-$/g, "");        // trim hyphens
            }

            // 6-char token (0-9A-Z), safe for filenames/URIs
            function randomToken6() {
              const n = Math.floor(Math.random() * (36 ** 6));
              return n.toString(36).toUpperCase().padStart(6, "0");
            }

            const errors = [];
            if (!catalog_action) errors.push("Missing: Catalog action");
            if (!catalog_name) errors.push("Missing: Catalog name");
            if (!dataset_title) errors.push("Missing: Dataset title");
            if (!dataset_description) errors.push("Missing: Dataset description");
            if (!use_case) errors.push("Missing: Use case");
            if (!location) errors.push("Missing: Location (high-level)");

            // Controlled vocab for use_case
            const allowedUseCases = new Set(["overload", "over_voltage", "under_voltage"]);
            if (use_case && !allowedUseCases.has(use_case)) {
              errors.push(`Use case must be one of: overload, over_voltage, under_voltage. Got: ${use_case}`);
            }

            // If creating a new catalog, require title/description
            if (/create new catalog/i.test(catalog_action)) {
              if (!catalog_title) errors.push("Missing: Catalog title (required when creating a new catalog)");
              if (!catalog_description) errors.push("Missing: Catalog description (required when creating a new catalog)");
            }

            // Generate catalog_id
            let catalog_id = "";
            let catalog_base = "";
            if (catalog_name) {
              catalog_base = normalizeBase(catalog_name);
              if (!catalog_base) {
                errors.push("Catalog name produced an empty ID after normalization. Please include letters/numbers.");
              } else {
                catalog_id = `${catalog_base}-${randomToken6()}`;
              }
            }

            core.setOutput("errors", JSON.stringify(errors));
            core.setOutput("catalog_action", catalog_action);
            core.setOutput("catalog_name", catalog_name);
            core.setOutput("catalog_title", catalog_title);
            core.setOutput("catalog_description", catalog_description);
            core.setOutput("catalog_id", catalog_id);
            core.setOutput("catalog_base", catalog_base);
            core.setOutput("dataset_title", dataset_title);
            core.setOutput("dataset_description", dataset_description);
            core.setOutput("use_case", use_case);
            core.setOutput("location", location);
            core.setOutput("concepts", concepts);
            core.setOutput("distributions", distributions);

      - name: Comment and stop on validation errors
        if: ${{ fromJSON(steps.parse.outputs.errors)[0] != null }}
        uses: actions/github-script@v7
        with:
          script: |
            const errors = JSON.parse(`${{ steps.parse.outputs.errors }}`);
            const msg =
              "❌ **Catalog intake validation failed**\n\n" +
              errors.map(e => `- ${e}`).join("\n") +
              "\n\nPlease edit the issue to fix these fields, then the workflow will re-run.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: msg
            });
            core.setFailed("Validation failed");

      - name: Comment generated Catalog ID (create only)
        if: ${{ contains(steps.parse.outputs.catalog_action, 'Create new catalog') }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ Generated Catalog ID: \`${{ steps.parse.outputs.catalog_id }}\`\n\nCatalog name: \`${{ steps.parse.outputs.catalog_name }}\``
            });

      - name: Create or update catalog YAML and append dataset
        id: write
        run: |
          set -euo pipefail

          ACTION="${{ steps.parse.outputs.catalog_action }}"
          CATALOG_NAME="${{ steps.parse.outputs.catalog_name }}"
          CATALOG_TITLE="${{ steps.parse.outputs.catalog_title }}"
          CATALOG_DESCRIPTION="${{ steps.parse.outputs.catalog_description }}"
          GENERATED_ID="${{ steps.parse.outputs.catalog_id }}"
          CATALOG_BASE="${{ steps.parse.outputs.catalog_base }}"

          mkdir -p catalogs

          python - <<'PY'
          import os, re, glob, datetime, random, string, pathlib

          action = os.environ["ACTION"]
          catalog_name = os.environ["CATALOG_NAME"]
          catalog_title = os.environ["CATALOG_TITLE"]
          catalog_description = os.environ["CATALOG_DESCRIPTION"]
          generated_id = os.environ["GENERATED_ID"]
          catalog_base = os.environ["CATALOG_BASE"]

          dataset_title = os.environ["DATASET_TITLE"]
          dataset_description = os.environ["DATASET_DESCRIPTION"]
          use_case = os.environ["USE_CASE"]
          location = os.environ["LOCATION"]
          concepts_raw = os.environ.get("CONCEPTS_RAW","").strip()
          dists_raw = os.environ.get("DISTS_RAW","").strip()
          issue_number = os.environ["ISSUE_NUMBER"]

          def norm_title(s: str) -> str:
            return re.sub(r"\s+", " ", s.strip()).lower()

          def extract_catalog_title(text: str) -> str:
            # Expect our generated structure:
            # catalog:
            #   id: ...
            #   title: "..."
            m = re.search(r'(?m)^\s*catalog:\s*\n(?:^\s{2,}.*\n)*?^\s{2,}title:\s*\"?(.+?)\"?\s*$', text)
            return (m.group(1).strip() if m else "")

          def file_for_update_by_name(name: str):
            wanted = norm_title(name)
            matches = []
            for fp in glob.glob("catalogs/*.yaml"):
              txt = pathlib.Path(fp).read_text(encoding="utf-8")
              title = extract_catalog_title(txt)
              if title and norm_title(title) == wanted:
                matches.append(fp)
            return matches

          def yaml_escape(s: str) -> str:
            return s.replace('\\', '\\\\').replace('"','\\"')

          def parse_concepts(raw: str):
            if not raw:
              return None
            items = [x.strip() for x in raw.split(",") if x.strip()]
            if not items:
              return None
            # Keep as uppercase-hyphen tokens? leave user-provided for now
            return items

          def parse_dists(raw: str):
            if not raw:
              return None
            lines = [x.strip() for x in raw.splitlines() if x.strip()]
            if not lines:
              return None
            return lines

          def ensure_catalog_file_create():
            fp = f"catalogs/{generated_id}.yaml"
            p = pathlib.Path(fp)
            if p.exists():
              # Extremely unlikely with random suffix; but still handle
              raise SystemExit(f"CATALOG_EXISTS:{fp}")

            content = (
              "catalog:\n"
              f"  id: {generated_id}\n"
              f"  title: \"{yaml_escape(catalog_title)}\"\n"
              f"  description: \"{yaml_escape(catalog_description)}\"\n"
              "  version: 1\n"
              "\n"
              "datasets: []\n"
            )
            p.write_text(content, encoding="utf-8")
            return fp

          def ensure_catalog_file_update():
            matches = file_for_update_by_name(catalog_name)
            if len(matches) == 0:
              raise SystemExit("CATALOG_NOT_FOUND_BY_NAME")
            if len(matches) > 1:
              raise SystemExit("CATALOG_NAME_AMBIGUOUS")
            return matches[0]

          def append_dataset(fp: str):
            p = pathlib.Path(fp)
            txt = p.read_text(encoding="utf-8").rstrip() + "\n"

            # Create dataset id: <CATALOGBASE>-<USECASE>-<YYYYMMDD>-<ISSUE#>
            date = datetime.date.today().strftime("%Y%m%d")
            dataset_id = f"{catalog_base}-{use_case.upper().replace('_','-')}-{date}-{issue_number}"

            concepts = parse_concepts(concepts_raw)
            dists = parse_dists(dists_raw)

            entry_lines = []
            entry_lines.append(f"  - id: {dataset_id}")
            entry_lines.append(f"    title: \"{yaml_escape(dataset_title)}\"")
            entry_lines.append(f"    description: \"{yaml_escape(dataset_description)}\"")
            entry_lines.append(f"    use_case: {use_case}")
            entry_lines.append(f"    location: \"{yaml_escape(location)}\"")
            if concepts:
              # YAML list
              concepts_escaped = [yaml_escape(x) for x in concepts]
              entry_lines.append("    concepts: [" + ", ".join(f"\"{c}\"" for c in concepts_escaped) + "]")
            entry_lines.append(f"    created: {datetime.date.today().isoformat()}")
            if dists:
              entry_lines.append("    distributions:")
              for line in dists:
                entry_lines.append(f"      - access: \"{yaml_escape(line)}\"")

            entry = "\n".join(entry_lines) + "\n"

            if re.search(r'(?m)^datasets:\\s*\\[\\]\\s*$', txt) or re.search(r'(?m)^datasets:\\s*\\[\\s*\\]\\s*$', txt) or "datasets: []" in txt:
              txt = txt.replace("datasets: []", "datasets:\n" + entry.rstrip() + "\n")
            else:
              # Append under datasets (assumes datasets already exists as a list)
              txt = txt.rstrip() + "\n" + entry

            p.write_text(txt, encoding="utf-8")
            return dataset_id

          # Choose create vs update
          if "Create new catalog" in action:
            fp = ensure_catalog_file_create()
          else:
            fp = ensure_catalog_file_update()

          dataset_id = append_dataset(fp)

          # Write outputs for later steps via stdout markers
          print(f"CATALOG_FILE={fp}")
          print(f"DATASET_ID={dataset_id}")
          PY
        env:
          ACTION: ${{ steps.parse.outputs.catalog_action }}
          CATALOG_NAME: ${{ steps.parse.outputs.catalog_name }}
          CATALOG_TITLE: ${{ steps.parse.outputs.catalog_title }}
          CATALOG_DESCRIPTION: ${{ steps.parse.outputs.catalog_description }}
          GENERATED_ID: ${{ steps.parse.outputs.catalog_id }}
          CATALOG_BASE: ${{ steps.parse.outputs.catalog_base }}
          DATASET_TITLE: ${{ steps.parse.outputs.dataset_title }}
          DATASET_DESCRIPTION: ${{ steps.parse.outputs.dataset_description }}
          USE_CASE: ${{ steps.parse.outputs.use_case }}
          LOCATION: ${{ steps.parse.outputs.location }}
          CONCEPTS_RAW: ${{ steps.parse.outputs.concepts }}
          DISTS_RAW: ${{ steps.parse.outputs.distributions }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Handle update errors (catalog not found / ambiguous)
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            // If the previous step fails, comment a generic hint.
            // (GitHub doesn't expose the Python exit reason cleanly here without extra plumbing.)
            const action = `${{ steps.parse.outputs.catalog_action }}`;
            if (action.includes("Update existing catalog")) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body:
                  "⚠️ **Update failed**.\n\n" +
                  "Most likely causes:\n" +
                  "- No existing catalog has a matching `catalog.title` for the provided **Catalog name**\n" +
                  "- More than one catalog has the same title (ambiguous)\n\n" +
                  "Fix: Ensure the Catalog name exactly matches an existing catalog title."
              });
            }

      - name: Create Pull Request
        if: ${{ success() }}
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Catalog intake: append dataset"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          title: "Catalog intake: ${{ steps.parse.outputs.dataset_title }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Catalog action: `${{ steps.parse.outputs.catalog_action }}`
            - Catalog name: `${{ steps.parse.outputs.catalog_name }}`
            - Generated/used catalog file: `catalogs/${{ steps.parse.outputs.catalog_id }}.yaml` (for create)

            After merge to `main`, your existing build/deploy workflow will regenerate the catalog and site.
          labels: "catalog-intake-pr"
