          p.write_text(yaml.safe_dump(doc, sort_keys=False, allow_unicode=True), encoding="utf-8")
          print(f"Wrote metric file: {p}")
          PY
        env:
          METRIC_ID: ${{ steps.parse.outputs.metric_id_G }}
          METRIC_PREF_LABEL: ${{ steps.parse.outputs.metric_pref_label_G }}
          METRIC_DEFINITION: ${{ steps.parse.outputs.metric_definition_G }}
          METRIC_EXPECTED_DATA_TYPE: ${{ steps.parse.outputs.metric_expected_data_type_G }}
          METRIC_DIMENSION: ${{ steps.parse.outputs.metric_dimension_G }}

      - name: Show pending changes
        if: ${{ success() }}
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo "=== git diff --name-only ==="
          git diff --name-only

      - name: Create Pull Request
        if: ${{ success() }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Generated Catalog ID (if applicable): `${{ steps.parse.outputs.generated_catalog_id }}`
            - Concept ID (if applicable): `${{ steps.parse.outputs.concept_id_E }}`
            - Policy ID (if applicable): `${{ steps.parse.outputs.policy_id_F }}`
            - Metric ID (if applicable): `${{ steps.parse.outputs.metric_id_G }}`

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
          labels: "catalog-intake-pr"
