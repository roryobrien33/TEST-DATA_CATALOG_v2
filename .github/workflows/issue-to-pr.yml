name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'catalog-add-dataset') ||
      startsWith(github.event.issue.title, '[Add Dataset]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Parse Issue Form fields
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";

            function escapeRegExp(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getField(heading) {
              const h = escapeRegExp(heading);
              const re = new RegExp("###\\s+" + h + "\\s*\\n([\\s\\S]*?)(?=\\n###\\s+|$)", "i");
              const m = body.match(re);
              if (!m) return "";
              return m[1].trim().replace(/^_No response_$/i, "").trim();
            }

            function slugify(name) {
              return name
                .trim()
                .toLowerCase()
                .replace(/[\s_]+/g, "-")
                .replace(/[^a-z0-9-]/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");
            }

            function randomToken6() {
              const n = Math.floor(Math.random() * (36 ** 6));
              return n.toString(36).toUpperCase().padStart(6, "0");
            }

            function isIri(s) {
              return s.startsWith("http://") || s.startsWith("https://");
            }

            function isCurie(s) {
              return s.includes(":") && !isIri(s);
            }

            function normalizeDatasetId(raw, title) {
              const s = (raw || "").trim();
              if (!s) {
                return `sdcdc:dataset-${slugify(title)}-${randomToken6()}`;
              }
              if (isIri(s) || isCurie(s)) return s;
              if (s.startsWith("dataset-")) return `sdcdc:${s}`;
              return `sdcdc:dataset-${slugify(s)}-${randomToken6()}`;
            }

            function normalizeRef(raw) {
              const s = (raw || "").trim();
              if (!s) return "";
              return s;
            }

            function parseRefCsv(raw) {
              if (!raw) return [];
              return raw
                .split(",")
                .map(x => normalizeRef(x))
                .filter(Boolean);
            }

            function validateDistributions(raw) {
              const errors = [];
              if (!raw || !raw.trim()) return errors;

              const allowedFormats = new Set([
                "csv", "text", "txt", "xlsx", "xls",
                "json", "xml", "ttl", "rdf", "parquet", "zip", "api"
              ]);

              const blocks = raw.trim().split(/\n\s*\n/);

              blocks.forEach((block, idx) => {
                const lines = block.split(/\n/).map(x => x.trim()).filter(Boolean);
                const obj = {};

                for (const line of lines) {
                  if (!line.includes(":")) {
                    errors.push(`Distribution block ${idx + 1}: invalid line '${line}'. Use 'Field: value' format.`);
                    continue;
                  }

                  const [k, ...rest] = line.split(":");
                  const key = k.trim().toLowerCase();
                  const value = rest.join(":").trim();

                  if (key === "title") obj.title = value;
                  else if (key === "description") obj.description = value;
                  else if (key === "format") obj.format = value;
                  else if (key === "access url") obj.access_url = value;
                  else if (key === "issued") obj.issued = value;
                  else errors.push(`Distribution block ${idx + 1}: unknown field '${k.trim()}'. Allowed fields are Title, Description, Format, Access URL, Issued.`);
                }

                if (!obj.format) {
                  errors.push(`Distribution block ${idx + 1}: missing Format.`);
                } else if (!allowedFormats.has(obj.format.toLowerCase())) {
                  errors.push(`Distribution block ${idx + 1}: invalid Format '${obj.format}'. Allowed values are csv, text, txt, xlsx, xls, json, xml, ttl, rdf, parquet, zip, api.`);
                }

                if (!obj.access_url) {
                  errors.push(`Distribution block ${idx + 1}: missing Access URL.`);
                } else if (!(obj.access_url.startsWith("http://") || obj.access_url.startsWith("https://"))) {
                  errors.push(`Distribution block ${idx + 1}: Access URL must start with http:// or https://.`);
                }

                if (obj.issued && !/^\d{4}-\d{2}-\d{2}$/.test(obj.issued)) {
                  errors.push(`Distribution block ${idx + 1}: Issued must use YYYY-MM-DD format.`);
                }
              });

              return errors;
            }

            const dataset_identifier = getField("Dataset identifier");
            const dataset_title = getField("Dataset title");
            const dataset_description = getField("Dataset description");
            const publisher_ids = getField("Publisher IDs (optional, comma-separated)");
            const contact_point_ids = getField("Contact Point IDs (optional, comma-separated)");
            const license_ids = getField("License IDs (optional, comma-separated)");
            const temporal_ids = getField("Period IDs (optional, comma-separated)");
            const series_ids = getField("Dataset Series IDs (optional, comma-separated)");
            const concept_ids = getField("Concept IDs (optional, comma-separated)");
            const policy_ids = getField("Policy IDs (optional, comma-separated)");
            const distributions = getField("Distributions (optional)");

            const errors = [];

            if (!dataset_identifier) errors.push("Missing: Dataset identifier");
            if (!dataset_title) errors.push("Missing: Dataset title");
            if (!dataset_description) errors.push("Missing: Dataset description");

            errors.push(...validateDistributions(distributions));

            const normalized_dataset_id = normalizeDatasetId(dataset_identifier, dataset_title);

            core.setOutput("errors", JSON.stringify(errors));
            core.setOutput("dataset_id", normalized_dataset_id);
            core.setOutput("dataset_title", dataset_title);
            core.setOutput("dataset_description", dataset_description);
            core.setOutput("publisher_ids", JSON.stringify(parseRefCsv(publisher_ids)));
            core.setOutput("contact_point_ids", JSON.stringify(parseRefCsv(contact_point_ids)));
            core.setOutput("license_ids", JSON.stringify(parseRefCsv(license_ids)));
            core.setOutput("temporal_ids", JSON.stringify(parseRefCsv(temporal_ids)));
            core.setOutput("series_ids", JSON.stringify(parseRefCsv(series_ids)));
            core.setOutput("concept_ids", JSON.stringify(parseRefCsv(concept_ids)));
            core.setOutput("policy_ids", JSON.stringify(parseRefCsv(policy_ids)));
            core.setOutput("distributions", distributions);

      - name: Comment and stop on validation errors
        if: ${{ fromJSON(steps.parse.outputs.errors)[0] != null }}
        uses: actions/github-script@v8
        with:
          script: |
            const errors = JSON.parse(`${{ steps.parse.outputs.errors }}`);
            const msg =
              "Catalog intake validation failed\n\n" +
              errors.map(e => "- " + e).join("\n") +
              "\n\nPlease edit the issue to fix these fields, then the workflow will re-run.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: msg
            });
            core.setFailed("Validation failed");

      - name: Create dataset and optional distribution YAML files
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import random
          import re
          import yaml

          ROOT = pathlib.Path("data-catalog")
          DATASETS_DIR = ROOT / "datasets"
          DISTRIBUTIONS_DIR = ROOT / "distributions"

          DATASETS_DIR.mkdir(parents=True, exist_ok=True)
          DISTRIBUTIONS_DIR.mkdir(parents=True, exist_ok=True)

          def slugify(value: str) -> str:
              s = str(value or "").strip().lower()
              s = re.sub(r"[\s_]+", "-", s)
              s = re.sub(r"[^a-z0-9-]", "-", s)
              s = re.sub(r"-+", "-", s).strip("-")
              return s

          def random_token6() -> str:
              chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
              return "".join(random.choice(chars) for _ in range(6))

          def file_stem_from_id(identifier: str) -> str:
              s = identifier.strip()
              if ":" in s:
                  s = s.split(":", 1)[1]
              s = re.sub(r"[^A-Za-z0-9._-]", "-", s)
              return s

          def parse_distributions(raw: str):
              if not raw.strip():
                  return []

              blocks = re.split(r"\n\s*\n", raw.strip())
              out = []

              for block in blocks:
                  record = {}
                  for line in block.splitlines():
                      line = line.strip()
                      if not line or ":" not in line:
                          continue

                      key, value = line.split(":", 1)
                      key = key.strip().lower()
                      value = value.strip()

                      if key == "title":
                          record["title"] = value
                      elif key == "description":
                          record["description"] = value
                      elif key == "format":
                          record["format"] = value
                      elif key == "access url":
                          record["accessURL"] = value
                      elif key == "issued":
                          record["issued"] = value

                  if record:
                      out.append(record)

              return out

          dataset_id = os.environ["DATASET_ID"].strip()
          dataset_title = os.environ["DATASET_TITLE"].strip()
          dataset_description = os.environ["DATASET_DESCRIPTION"].strip()
          publisher_ids = json.loads(os.environ.get("PUBLISHER_IDS", "[]"))
          contact_point_ids = json.loads(os.environ.get("CONTACT_POINT_IDS", "[]"))
          license_ids = json.loads(os.environ.get("LICENSE_IDS", "[]"))
          temporal_ids = json.loads(os.environ.get("TEMPORAL_IDS", "[]"))
          series_ids = json.loads(os.environ.get("SERIES_IDS", "[]"))
          concept_ids = json.loads(os.environ.get("CONCEPT_IDS", "[]"))
          policy_ids = json.loads(os.environ.get("POLICY_IDS", "[]"))
          distributions_raw = os.environ.get("DISTRIBUTIONS", "")

          dataset_file = DATASETS_DIR / f"{file_stem_from_id(dataset_id)}.yaml"
          if dataset_file.exists():
              raise SystemExit(f"Dataset file already exists: {dataset_file}")

          distribution_ids = []
          parsed_distributions = parse_distributions(distributions_raw)

          for idx, dist in enumerate(parsed_distributions, start=1):
              fmt = str(dist.get("format", "")).strip().lower()
              dist_id = f"sdcdc:distribution-{slugify(dataset_title)}-{fmt or 'dist'}-{random_token6()}"
              distribution_ids.append(dist_id)

              dist_title = str(dist.get("title", "")).strip()
              if not dist_title:
                  dist_title = f"{dataset_title} {fmt.upper() if fmt else 'Distribution'} {idx}"

              dist_doc = {
                  "distribution": {
                      "identifier": dist_id,
                      "title": dist_title,
                  }
              }

              dist_description = str(dist.get("description", "")).strip()
              if dist_description:
                  dist_doc["distribution"]["description"] = dist_description

              dist_issued = str(dist.get("issued", "")).strip()
              if dist_issued:
                  dist_doc["distribution"]["issued"] = dist_issued

              dist_format = str(dist.get("format", "")).strip()
              if dist_format:
                  dist_doc["distribution"]["format"] = dist_format

              access_url = str(dist.get("accessURL", "")).strip()
              if access_url:
                  dist_doc["distribution"]["accessURL"] = access_url

              dist_file = DISTRIBUTIONS_DIR / f"{file_stem_from_id(dist_id)}.yaml"
              dist_file.write_text(
                  yaml.safe_dump(dist_doc, sort_keys=False, allow_unicode=True),
                  encoding="utf-8"
              )

          dataset_doc = {
              "dataset": {
                  "identifier": dataset_id,
                  "title": dataset_title,
                  "description": dataset_description,
              }
          }

          if publisher_ids:
              dataset_doc["dataset"]["publisher"] = publisher_ids
          if contact_point_ids:
              dataset_doc["dataset"]["contactPoint"] = contact_point_ids
          if license_ids:
              dataset_doc["dataset"]["license"] = license_ids
          if temporal_ids:
              dataset_doc["dataset"]["temporal"] = temporal_ids
          if series_ids:
              dataset_doc["dataset"]["inSeries"] = series_ids
          if concept_ids:
              dataset_doc["dataset"]["theme"] = concept_ids
          if policy_ids:
              dataset_doc["dataset"]["hasPolicy"] = policy_ids
          if distribution_ids:
              dataset_doc["dataset"]["distribution"] = distribution_ids

          dataset_file.write_text(
              yaml.safe_dump(dataset_doc, sort_keys=False, allow_unicode=True),
              encoding="utf-8"
          )

          print(f"Wrote dataset file: {dataset_file}")
          print(f"Created {len(distribution_ids)} distribution file(s)")
          PY
        env:
          DATASET_ID: ${{ steps.parse.outputs.dataset_id }}
          DATASET_TITLE: ${{ steps.parse.outputs.dataset_title }}
          DATASET_DESCRIPTION: ${{ steps.parse.outputs.dataset_description }}
          PUBLISHER_IDS: ${{ steps.parse.outputs.publisher_ids }}
          CONTACT_POINT_IDS: ${{ steps.parse.outputs.contact_point_ids }}
          LICENSE_IDS: ${{ steps.parse.outputs.license_ids }}
          TEMPORAL_IDS: ${{ steps.parse.outputs.temporal_ids }}
          SERIES_IDS: ${{ steps.parse.outputs.series_ids }}
          CONCEPT_IDS: ${{ steps.parse.outputs.concept_ids }}
          POLICY_IDS: ${{ steps.parse.outputs.policy_ids }}
          DISTRIBUTIONS: ${{ steps.parse.outputs.distributions }}

      - name: Show pending changes
        if: ${{ success() }}
        run: |
          echo "=== git status --short --untracked-files=all ==="
          git status --short --untracked-files=all
          echo "=== git diff --name-only ==="
          git diff --name-only

      - name: Create Pull Request
        if: ${{ success() }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "Catalog intake: issue #${{ github.event.issue.number }}"
          branch: "catalog-intake/${{ github.event.issue.number }}"
          title: "Catalog intake: issue #${{ github.event.issue.number }}"
          body: |
            This PR was automatically generated from issue #${{ github.event.issue.number }}.

            - Labels: `${{ join(github.event.issue.labels.*.name, ', ') }}`
            - Dataset ID: `${{ steps.parse.outputs.dataset_id }}`

            After merge to `main`, the Pages deployment workflow will rebuild and publish the static catalog site.
          labels: "catalog-intake-pr"
